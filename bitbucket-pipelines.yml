# Bitbucket Pipelines — publish this private dev repo to the PUBLIC GitHub repo
# that the Craft Plugin Store reads (github.com/Gerry3010/gh-gallery-craft).
#
# Auth: an ed25519 SSH deploy key. Its public half is a read-write deploy key on
# the GitHub repo; its private half is stored here as the SECURED repository
# variable  GH_DEPLOY_KEY_B64  (base64 of the private key). Set via:
#     bb var-set GH_DEPLOY_KEY_B64 "$(base64 -w0 <privatekey>)"
#
# Note: the gh-gallery web-component *bundle* is synced into src/web/assets/ from
# the separate private repo (gh-gallery-revamped) before tagging a release — this
# pipeline only mirrors whatever is committed here.

image: alpine/git:2.45.2

definitions:
  steps:
    - step: &publish
        name: Publish → GitHub
        clone:
          depth: full # full history + tags for a faithful mirror
        script:
          - mkdir -p ~/.ssh
          - echo "$GH_DEPLOY_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
          - chmod 600 ~/.ssh/id_ed25519
          - export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          - GH=git@github.com:Gerry3010/gh-gallery-craft.git
          # Mirror the current branch tip to GitHub's main.
          - git push "$GH" "HEAD:refs/heads/main"
          # On a tag build, also publish the tag so the Plugin Store sees the release.
          - if [ -n "$BITBUCKET_TAG" ]; then git push "$GH" "refs/tags/$BITBUCKET_TAG"; fi
        # pipepush notification — runs on success AND failure (BITBUCKET_EXIT_CODE
        # is set here; 0 = success). apk-add curl: the alpine/git image has none.
        after-script:
          - if [ "${BITBUCKET_EXIT_CODE:-1}" = "0" ]; then PP_STATUS=success; else PP_STATUS=failure; fi
          - apk add --no-cache curl >/dev/null 2>&1 || true
          - >
            curl -sf -X POST "$PIPEPUSH_SERVER/api/webhook"
            -H "Content-Type: application/json"
            -d "{\"token\":\"$PIPEPUSH_TOKEN\",\"status\":\"$PP_STATUS\",\"pipeline\":\"bb-gh-mirror\",\"branch\":\"${BITBUCKET_BRANCH:-$BITBUCKET_TAG}\",\"commit\":\"$BITBUCKET_COMMIT\",\"runId\":\"$BITBUCKET_BUILD_NUMBER\"}"
            || true

pipelines:
  branches:
    main:
      - step: *publish
  tags:
    'v*':
      - step: *publish
